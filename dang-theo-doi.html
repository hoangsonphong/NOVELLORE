<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đang Theo Dõi - NovelLore</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:wght@400;500;600&family=Josefin+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#0d0b0e;
  --parchment:#f5efe4;
  --gold:#c9a84c;
  --gold-light:#e8c97a;
  --crimson:#8b1a2f;
  --mist:#d4c9b8;
  --smoke:#17121e;
  --border-gold:rgba(201,168,76,0.2);
  --border-gold-strong:rgba(201,168,76,0.45);
}
html{scroll-behavior:smooth;}
body{
  background:radial-gradient(circle at top,#24152e 0%,#0d0b0e 58%);
  color:var(--parchment);
  font-family:'Cormorant Garamond',serif;
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;
  opacity:.28;
}
.topbar{
  position:sticky;
  top:0;
  z-index:5;
  background:linear-gradient(180deg,#120f17 0%,#0d0b0e 100%);
  border-bottom:1px solid var(--border-gold);
}
.topbar-inner{
  max-width:1200px;
  margin:0 auto;
  padding:18px 32px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
}
.brand{
  text-decoration:none;
  color:var(--gold-light);
  font-family:'Playfair Display',serif;
  font-size:28px;
  font-weight:900;
}
.brand span{color:var(--crimson);}
.top-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.ghost-btn,.main-btn{
  text-decoration:none;
  font-family:'Josefin Sans',sans-serif;
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  padding:11px 18px;
}
.ghost-btn{
  color:var(--mist);
  border:1px solid rgba(212,201,184,.2);
}
.main-btn{
  color:var(--ink);
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
}
.page{
  max-width:1200px;
  margin:0 auto;
  padding:40px 32px 72px;
}
.eyebrow{
  font-family:'Josefin Sans',sans-serif;
  font-size:11px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:var(--crimson);
  margin-bottom:14px;
}
.title{
  font-family:'Playfair Display',serif;
  font-size:48px;
  line-height:1.08;
  margin-bottom:12px;
}
.subtitle{
  font-size:22px;
  color:rgba(212,201,184,.72);
  margin-bottom:28px;
}
.summary{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:16px;
  margin-bottom:32px;
}
.stat{
  background:rgba(23,18,30,.88);
  border:1px solid var(--border-gold);
  padding:18px;
}
.stat-label{
  font-family:'Josefin Sans',sans-serif;
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:rgba(212,201,184,.4);
  margin-bottom:8px;
}
.stat-value{
  font-family:'Playfair Display',serif;
  font-size:30px;
  color:var(--gold-light);
}
.tracked-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:18px;
}
.tracked-card{
  display:flex;
  gap:0;
  text-decoration:none;
  color:inherit;
  background:rgba(23,18,30,.88);
  border:1px solid var(--border-gold);
  overflow:hidden;
  transition:border-color .25s,transform .25s;
}
.tracked-card:hover{
  border-color:var(--border-gold-strong);
  transform:translateY(-2px);
}
.tracked-cover{
  width:120px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
.cv-crimson{background:linear-gradient(160deg,#2a1018 0%,#4a1828 60%,#150a10 100%);}
.cv-navy{background:linear-gradient(160deg,#0c1828 0%,#1a2e50 60%,#080f1c 100%);}
.cv-forest{background:linear-gradient(160deg,#101e08 0%,#1e3810 60%,#0a1205 100%);}
.cv-amber{background:linear-gradient(160deg,#1e1408 0%,#3a2818 60%,#120c04 100%);}
.cv-violet{background:linear-gradient(160deg,#140e28 0%,#281848 60%,#0c081a 100%);}
.tracked-cover svg{width:60px;height:88px;opacity:.88;}
.tracked-info{
  padding:18px;
  flex:1;
  min-width:0;
}
.tracked-label{
  font-family:'Josefin Sans',sans-serif;
  font-size:10px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--crimson);
  margin-bottom:8px;
}
.tracked-title{
  font-family:'Playfair Display',serif;
  font-size:22px;
  line-height:1.25;
  color:var(--parchment);
  margin-bottom:8px;
}
.tracked-desc{
  font-size:18px;
  line-height:1.7;
  color:rgba(212,201,184,.66);
  margin-bottom:12px;
}
.tracked-meta{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}
.tracked-chip{
  font-family:'Josefin Sans',sans-serif;
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--gold);
}
.empty-box{
  background:rgba(23,18,30,.88);
  border:1px solid var(--border-gold);
  padding:26px;
}
.empty-title{
  font-family:'Playfair Display',serif;
  font-size:30px;
  color:var(--gold-light);
  margin-bottom:10px;
}
.empty-desc{
  font-size:20px;
  line-height:1.7;
  color:rgba(212,201,184,.68);
  margin-bottom:18px;
}
.empty-actions{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
@media(max-width:900px){
  .summary,.tracked-grid{grid-template-columns:1fr;}
  .tracked-card{flex-direction:column;}
  .tracked-cover{width:100%;height:220px;}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="brand">Novel<span>Lore</span></a>
    <div class="top-actions">
      <a href="index.html" class="ghost-btn">Trang Chủ</a>
      <a href="login.html?force=1" class="ghost-btn" id="loginLink">Đăng Nhập</a>
      <span id="welcomeUser" style="display:none;color:var(--gold-light);font-family:'Josefin Sans',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;"></span>
      <button id="logoutBtn" class="ghost-btn" style="display:none;background:none;cursor:pointer;">Đăng Xuất</button>
    </div>
  </div>
</header>

<main class="page">
  <div class="eyebrow">Thư Viện Cá Nhân</div>
  <h1 class="title">Đang Theo Dõi</h1>
  <p class="subtitle" id="pageSubtitle">Nơi lưu lại các bộ truyện bạn muốn đọc tiếp.</p>

  <section class="summary" id="summarySection" style="display:none;">
    <div class="stat">
      <div class="stat-label">Tài Khoản</div>
      <div class="stat-value" id="statUser">-</div>
    </div>
    <div class="stat">
      <div class="stat-label">Số Truyện</div>
      <div class="stat-value" id="statCount">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Trạng Thái</div>
      <div class="stat-value">Đang Lưu</div>
    </div>
  </section>

  <div id="trackedContent"></div>
</main>

<script>
// Dữ liệu chi tiết cho các truyện đã biết — thêm truyện mới vào đây
const bookData = {
  'Vạn Cổ Thần Vương':       { genre:'Tiên Hiệp',    chapter:'Ch. 2.847',        cv:'cv-crimson', desc:'Từ một thiếu niên bị khinh rẻ, Diệp Trần từng bước vươn lên và chạm tới cảnh giới thần vương.', link:'van-co-than-vuong.html' },
  'Thiên Đạo Đồ':            { genre:'Huyền Huyễn',  chapter:'Ch. 1.203',        cv:'cv-navy',    desc:'Khi bản đồ thiên đạo hiện ra trước mắt, số phận cả vũ trụ đặt lên vai một chàng trai trẻ không ai ngờ tới.', link:'thien-dao-do.html' },
  'Thiên Đạo Đồ Thư Quán':   { genre:'Huyền Huyễn',  chapter:'Ch. 1.203',        cv:'cv-navy',    desc:'Hành trình tu tiên kỳ bí trong thư viện thiên đạo huyền bí.', link:'thien-dao-do.html' },
  'Lâm Gia Hữu Nữ':          { genre:'Ngôn Tình',    chapter:'Ch. 880 — Hoàn',   cv:'cv-forest',  desc:'Câu chuyện tình yêu ngọt ngào và xúc động của cô gái nhà họ Lâm.', link:'lam-gia-huu-nu.html' },
  'Độc Bộ Thiên Hạ':         { genre:'Kiếm Hiệp',    chapter:'Ch. 3.120',        cv:'cv-amber',   desc:'Một kiếm khách độc hành ngang dọc giang hồ, danh chấn thiên hạ.', link:'doc-bo-thien-ha.html' },
  'Ngân Hà Truyền Thuyết':   { genre:'Khoa Huyễn',   chapter:'Ch. 445',          cv:'cv-violet',  desc:'Huyền thoại về dải ngân hà và những nền văn minh bí ẩn ngoài vũ trụ.', link:'ngan-ha-truyen-thuyet.html' },
  'Ngân Hà Truyện':          { genre:'Khoa Huyễn',   chapter:'Ch. 980',          cv:'cv-violet',  desc:'Câu chuyện tình yêu lãng mạn trải dài như dải ngân hà.', link:'ngan-ha-truyen.html' },
  'Đế Quốc Tái Sinh':        { genre:'Lịch Sử',      chapter:'Ch. 672',          cv:'cv-navy',    desc:'Một đế chế sụp đổ được tái sinh qua bàn tay của một nhân vật thiên tài.', link:'de-quoc-tai-sinh.html' },
  'Hệ Thống Vô Song':        { genre:'Hệ Thống',     chapter:'Ch. 1.880',        cv:'cv-crimson', desc:'Sở hữu hệ thống vô địch, anh ta bước trên con đường không ai có thể ngăn cản.', link:'he-thong-vo-song.html' },
  'Xuyên Về Thời Đường':     { genre:'Xuyên Không',  chapter:'Ch. 1.204 — Hoàn', cv:'cv-forest',  desc:'Một linh hồn hiện đại xuyên về thời Đường, mang trí tuệ từ tương lai để viết nên trang sử mới.', link:'xuyen-ve-thoi-duong.html' },
  'Đô Thị Siêu Năng':        { genre:'Đô Thị',       chapter:'Ch. 3.560',        cv:'cv-violet',  desc:'Giữa lòng đô thị hiện đại, một thanh niên bình thường thức tỉnh sức mạnh siêu năng bí ẩn.', link:'do-thi-sieu-nang.html' },
  'Mạt Thế Chí Tôn':         { genre:'Mạt Thế',      chapter:'Ch. 920',          cv:'cv-amber',   desc:'Thế giới tận thế bùng nổ, chỉ có kẻ mạnh nhất mới có thể sống sót và đứng trên đỉnh cao.', link:'mat-the-chi-ton.html' },
  'Tiên Nghịch':             { genre:'Tu Tiên',      chapter:'Ch. 2.200 — Hoàn', cv:'cv-crimson', desc:'Nghịch thiên mà hành, phá vỡ mọi quy tắc tu tiên để đạt cảnh giới tối thượng.', link:'#' },
  'Tuyết Dao Ký':            { genre:'Kiếm Hiệp',    chapter:'Ch. 1.680 — Hoàn', cv:'cv-navy',    desc:'Thanh kiếm trắng như tuyết và ký ức về một tình yêu không thể nào quên.', link:'#' },
  'Thần Mộ':                 { genre:'Huyền Huyễn',  chapter:'Ch. 3.360 — Hoàn', cv:'cv-violet',  desc:'Lăng mộ của thần linh chứa đựng bí mật ngàn năm chờ người có duyên khám phá.', link:'#' },
  'Đế Bá':                   { genre:'Huyền Huyễn',  chapter:'Ch. 4.280 — Hoàn', cv:'cv-amber',   desc:'Bá chủ thiên hạ, đứng trên đỉnh cao của mọi cảnh giới, không ai dám chống lại.', link:'#' },
  'Linh Vực':                { genre:'Tu Tiên',      chapter:'Ch. 3.000 — Hoàn', cv:'cv-forest',  desc:'Cảnh giới linh vực huyền bí, nơi sức mạnh và trí tuệ quyết định sự sống còn.', link:'#' },
  'Kiếm Đế Vô Danh':        { genre:'Kiếm Hiệp',    chapter:'Ch. 2.100',        cv:'cv-crimson', desc:'Một kiếm thủ vô danh bước ra từ bóng tối, danh tiếng chấn động thiên hạ mà không ai biết thân thế.', link:'#' },
  'Long Vương Giáng Thế':    { genre:'Huyền Huyễn',  chapter:'Ch. 880',          cv:'cv-navy',    desc:'Vương giả của loài rồng đầu thai vào thân xác phàm nhân, thức tỉnh sức mạnh cổ đại.', link:'#' },
  'Trọng Sinh Chi Lộ':       { genre:'Xuyên Không',  chapter:'Ch. 1.440',        cv:'cv-forest',  desc:'Được trọng sinh về quá khứ, cô gái quyết không lặp lại sai lầm và viết nên trang đời mới.', link:'#' },
  'Cổ Chân Ký':              { genre:'Tiên Hiệp',    chapter:'Ch. 3.600 — Hoàn', cv:'cv-amber',   desc:'Hành trình của một tu sĩ bình thường trải qua vạn năm gian khổ để đạt cảnh giới cổ chân bất diệt.', link:'#' },
};

const cvList = ['cv-crimson','cv-navy','cv-forest','cv-amber','cv-violet'];

// Tự động tạo link từ tên truyện nếu chưa có trong bookData
function titleToLink(title) {
  return title
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/\u0111/g,'d')
    .replace(/[^a-z0-9\s]/g,'')
    .trim().replace(/\s+/g,'-') + '.html';
}

const svgArt = `<svg width="60" height="88" viewBox="0 0 60 88" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="30" cy="40" r="18" stroke="#c9a84c" stroke-width="1" opacity=".5"/><line x1="30" y1="10" x2="30" y2="70" stroke="#c9a84c" stroke-width=".7" opacity=".4"/><circle cx="30" cy="40" r="5" fill="#8b1a2f" opacity=".8"/><path d="M22 74 Q30 70 38 74 Q30 78 22 74Z" fill="#c9a84c" opacity=".4"/></svg>`;

function getCurrentUser() {
  return JSON.parse(localStorage.getItem('currentUser'));
}

function logoutUser() {
  localStorage.removeItem('currentUser');
}

function getTrackedStorageKey(user) {
  return user && user.email ? `trackedBooks:${user.email}` : null;
}

function getTrackedBooks(user) {
  const key = getTrackedStorageKey(user);
  if (!key) return [];
  return JSON.parse(localStorage.getItem(key)) || [];
}

function getHiddenStories() {
  return JSON.parse(localStorage.getItem('hiddenStories')) || [];
}

const loginLink = document.getElementById('loginLink');
const welcomeUser = document.getElementById('welcomeUser');
const logoutBtn = document.getElementById('logoutBtn');
const trackedContent = document.getElementById('trackedContent');
const pageSubtitle = document.getElementById('pageSubtitle');
const summarySection = document.getElementById('summarySection');
const statUser = document.getElementById('statUser');
const statCount = document.getElementById('statCount');

const currentUser = getCurrentUser();

if (currentUser) {
  if (loginLink) loginLink.style.display = 'none';
  if (welcomeUser) {
    welcomeUser.style.display = 'inline-block';
    welcomeUser.textContent = 'Xin chào, ' + currentUser.name;
  }
  if (logoutBtn) {
    logoutBtn.style.display = 'inline-block';
  }
}

if (logoutBtn) {
  logoutBtn.addEventListener('click', function() {
    logoutUser();
    window.location.href = 'login.html?force=1';
  });
}

function renderTrackedPage() {
  if (!currentUser) {
    trackedContent.innerHTML = `
      <div class="empty-box">
        <div class="empty-title">Bạn cần đăng nhập</div>
        <div class="empty-desc">Đăng nhập để xem các bộ truyện đang theo dõi và lưu lại những truyện bạn muốn quay lại sau.</div>
        <div class="empty-actions">
          <a href="login.html?force=1" class="main-btn">Đăng Nhập</a>
          <a href="dangky.html?force=1" class="ghost-btn">Đăng Ký</a>
        </div>
      </div>`;
    return;
  }

  const trackedTitles = getTrackedBooks(currentUser);
  const hiddenStories = getHiddenStories();
  summarySection.style.display = 'grid';
  pageSubtitle.textContent = 'Danh sách truyện đang được lưu theo tài khoản của bạn.';
  statUser.textContent = currentUser.name || currentUser.email;
  statCount.textContent = trackedTitles.filter(title => !hiddenStories.includes(title)).length;

  const visibleTitles = trackedTitles
    .filter((title, index, arr) => arr.indexOf(title) === index)
    .filter(title => !hiddenStories.includes(title));

  if (!visibleTitles.length) {
    trackedContent.innerHTML = `
      <div class="empty-box">
        <div class="empty-title">Chưa có truyện nào</div>
        <div class="empty-desc">Bạn chưa theo dõi bộ truyện nào. Hãy mở một trang truyện và bấm Theo Dõi để lưu lại tại đây.</div>
        <div class="empty-actions">
          <a href="index.html" class="main-btn">Khám Phá Truyện</a>
        </div>
      </div>`;
    return;
  }

  trackedContent.innerHTML = `
    <section class="tracked-grid">
      ${visibleTitles.map((title, i) => {
        const book = bookData[title] || {};
        const link    = book.link    || titleToLink(title);
        const cv      = book.cv      || cvList[i % cvList.length];
        const genre   = book.genre   || 'Truyện';
        const chapter = book.chapter || '';
        const desc    = book.desc    || 'Nhấn để tiếp tục đọc bộ truyện này.';
        return `
          <a href="${link}" class="tracked-card">
            <div class="tracked-cover ${cv}">${svgArt}</div>
            <div class="tracked-info">
              <div class="tracked-label">Đang theo dõi</div>
              <div class="tracked-title">${title}</div>
              <div class="tracked-desc">${desc}</div>
              <div class="tracked-meta">
                <span class="tracked-chip">${genre}</span>
                ${chapter ? `<span class="tracked-chip">${chapter}</span>` : ''}
              </div>
            </div>
          </a>`;
      }).join('')}
    </section>`;
  statCount.textContent = visibleTitles.length;
}

renderTrackedPage();
</script>
</body>
</html>
