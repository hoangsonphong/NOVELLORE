<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovelLore - Đăng Nhập</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cormorant+Garamond:wght@400;600&family=Josefin+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#0d0b0e;--gold:#c9a84c;--gold-light:#e8c97a;
  --crimson:#8b1a2f;--parchment:#f5efe4;--mist:#d4c9b8;
}
body{
  background:radial-gradient(circle at top,#24152e 0%,#0d0b0e 60%);
  min-height:100vh;display:flex;justify-content:center;align-items:center;
  font-family:'Cormorant Garamond',serif;color:var(--parchment);overflow:hidden;
}
body::before{
  content:"";position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  pointer-events:none;
}
.login-container{
  width:400px;background:rgba(20,15,25,0.9);
  border:1px solid rgba(201,168,76,0.3);padding:40px;
  box-shadow:0 0 30px rgba(0,0,0,0.6);position:relative;z-index:2;
}
.login-container::before{
  content:"";position:absolute;top:0;left:0;width:100%;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),var(--crimson),var(--gold),transparent);
}
.logo{text-align:center;font-family:'Playfair Display',serif;font-size:32px;color:var(--gold-light);margin-bottom:10px;}
.logo span{color:var(--crimson);}
.subtitle{text-align:center;font-size:14px;letter-spacing:3px;margin-bottom:30px;color:var(--mist);font-family:'Josefin Sans',sans-serif;}
.home-link{text-align:center;margin-bottom:25px;}
.home-link a{color:var(--mist);text-decoration:none;font-family:'Josefin Sans',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;transition:0.3s;}
.home-link a:hover{color:var(--gold-light);}
.input-group{margin-bottom:20px;}
.input-group label{display:block;margin-bottom:8px;color:var(--gold);}
.input-group input{width:100%;padding:12px;background:#16111b;border:1px solid rgba(201,168,76,0.2);color:white;outline:none;font-size:15px;}
.input-group input:focus{border-color:var(--gold);}
.login-btn{
  width:100%;padding:12px;background:linear-gradient(135deg,var(--gold),var(--gold-light));
  border:none;color:black;font-weight:bold;cursor:pointer;margin-top:10px;
  font-family:'Josefin Sans',sans-serif;font-size:13px;letter-spacing:2px;
  transition:opacity .2s;
}
.login-btn:hover{opacity:0.9;}
.login-btn:disabled{opacity:0.5;cursor:not-allowed;}
.register-link{text-align:center;margin-top:20px;font-size:14px;}
.register-link a{color:var(--crimson);text-decoration:none;}
#loginMsg{
  margin-top:15px;text-align:center;color:var(--gold-light);
  font-family:'Josefin Sans',sans-serif;font-size:12px;letter-spacing:1px;min-height:18px;
}
</style>
</head>
<body>

<div class="login-container">
  <div class="logo">Novel<span>Lore</span></div>
  <div class="subtitle">CỔNG TRUY CẬP THƯ VIỆN</div>

  <div class="home-link">
    <a href="index.html">← Quay về trang chủ</a>
  </div>

  <form id="loginForm">
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="loginEmail" required autocomplete="email"/>
    </div>
    <div class="input-group">
      <label>Mật khẩu</label>
      <input type="password" id="loginPassword" required autocomplete="current-password"/>
    </div>
    <button type="button" class="login-btn" id="loginBtn" onclick="handleLogin()">Đăng Nhập</button>
  </form>

  <p id="loginMsg"></p>

  <div class="register-link">
    Chưa có tài khoản? <a href="dangky.html?force=1">Đăng ký ngay</a>
  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://snimdewrrausajqjpcqi.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNuaW1kZXdycmF1c2FqcWpwY3FpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4ODUwNjQsImV4cCI6MjA5MzQ2MTA2NH0.C4KJvcP_7Nblxw7Tfce5osEW36L5iazMunY2fQBfcT4';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const loginForm = document.getElementById('loginForm');
const loginMsg  = document.getElementById('loginMsg');
const loginBtn  = document.getElementById('loginBtn');

// Kiểm tra: nếu URL có ?logout=1 thì xóa session
// Nếu đang ở trang login mà có session → chỉ redirect nếu KHÔNG phải do bấm "Đăng Nhập" lại
const urlParams = new URLSearchParams(window.location.search);
const isLogout = urlParams.get('logout') === '1';
const isForced = urlParams.get('force') === '1';

if (isLogout) {
  // Vừa đăng xuất → xóa sạch session rồi hiện form
  sb.auth.signOut().then(() => {
    localStorage.removeItem('currentUser');
  });
} else if (!isForced) {
  // Bình thường: nếu còn session thì về trang chủ
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'index.html';
  });
}

async function handleLogin() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  if (!email || !password) {
    loginMsg.style.color = '#ff8a8a';
    loginMsg.textContent = 'Vui lòng nhập đầy đủ email và mật khẩu.';
    return;
  }

  loginBtn.disabled = true;
  loginMsg.style.color = '#e8c97a';
  loginMsg.textContent = 'Đang đăng nhập…';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    loginMsg.style.color = '#ff8a8a';
    loginMsg.textContent = error.message.includes('Invalid') || error.message.includes('invalid')
      ? 'Sai email hoặc mật khẩu.'
      : error.message;
    loginBtn.disabled = false;
    return;
  }

  // Lấy profile để biết role
  const { data: profile } = await sb
    .from('profiles')
    .select('username, display_name, role')
    .eq('id', data.user.id)
    .maybeSingle();

  localStorage.setItem('currentUser', JSON.stringify({
    id:    data.user.id,
    email: data.user.email,
    name:  profile?.display_name || profile?.username || email,
    role:  profile?.role || 'user'
  }));

  loginMsg.style.color = '#6bcb77';
  loginMsg.textContent = 'Đăng nhập thành công. Đang chuyển trang…';
  setTimeout(() => window.location.href = 'index.html', 900);
}

// Cho phép bấm Enter để đăng nhập
document.getElementById('loginPassword').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleLogin();
});
document.getElementById('loginEmail').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
